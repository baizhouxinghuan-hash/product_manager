<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>登录商品后台</title>
<style>
body { font-family:"Microsoft YaHei"; display:flex; justify-content:center; align-items:center; height:100vh; background:#f0f2f5; }
.box { background:white; padding:40px; border-radius:12px; box-shadow:0 0 15px rgba(0,0,0,0.3); width:300px; text-align:center; }
input { width:100%; padding:10px; margin:10px 0; border-radius:6px; border:1px solid #ccc; }
button { width:100%; padding:10px; border:none; border-radius:6px; background:#3498db; color:white; font-weight:bold; cursor:pointer; }
.error { color:red; font-size:14px; }
</style>
</head>
<body>
<div class="box">
<h2>商品后台登录</h2>
<form method="post">
<input type="password" name="password" placeholder="请输入密码" required>
<button type="submit">登录</button>
</form>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>修改密码</title>
<style>
body { font-family:"Microsoft YaHei"; display:flex; justify-content:center; align-items:center; height:100vh; background:#f0f2f5; }
.box { background:white; padding:40px; border-radius:12px; box-shadow:0 0 20px rgba(0,0,0,0.3); width:350px; text-align:center; }
input { width:100%; padding:10px; margin:10px 0; border-radius:6px; border:1px solid #ccc; }
button { width:100%; padding:10px; border:none; border-radius:6px; background:#f39c12; color:white; font-weight:bold; cursor:pointer; }
.success { color:green; font-size:14px; }
</style>
</head>
<body>
<div class="box">
<h2>修改密码</h2>
<form method="post">
<input type="password" name="new_password" placeholder="输入新密码" required>
<button type="submit">修改密码</button>
</form>
{% if success %}<p class="success">密码修改成功！</p>{% endif %}
<a href="{{ url_for('index') }}">返回首页</a>
</div>
</body>
</html>
